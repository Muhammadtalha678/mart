name: Build and Deploy to Hugging Face

on:
  push:
    branches:
      - main  # Agar aap ki main branch ka naam 'master' hai, toh yahan master likhein

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: muhammadtalha678/mart-backend:latest  # Aap ka Docker Hub repo aur latest tag

    - name: Force Restart Hugging Face Space (Clear Cache)
      run: |
        curl -X POST "https://huggingface.co" \
             -H "Authorization: Bearer ${{ secrets.HF_MARTBACKEND }}"
